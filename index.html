    <script>
        // 1. 找到切换按钮和 <body> 标签
        const themeToggleBtn = document.querySelector('.floating-buttons .float-btn:first-child');
        const body = document.body;

        // 2. 检查用户上次的主题偏好 (默认深色)
        const currentTheme = localStorage.getItem('theme');

        if (currentTheme === 'light') {
            body.classList.remove('dark-mode');
            themeToggleBtn.innerHTML = '🌙'; // 显示月亮 (点击可切回深色)
        } else {
            body.classList.add('dark-mode');
            themeToggleBtn.innerHTML = '☀️'; // 显示太阳 (点击可切为浅色)
        }

        themeToggleBtn.addEventListener('click', () => {
            // 切换 body 上的 .dark-mode 类
            body.classList.toggle('dark-mode');

            if (body.classList.contains('dark-mode')) {
                // 如果现在是深色模式
                themeToggleBtn.innerHTML = '☀️';
                localStorage.setItem('theme', 'dark'); // 保存 'dark'
            } else {
                // 如果现在是浅色模式
                themeToggleBtn.innerHTML = '🌙';
                localStorage.setItem('theme', 'light'); // 保存 'light'
            }
        });

        function scrollToTop() {
            window.scrollTo({
                top: 0,
                behavior: 'smooth' // 平滑滚动
            });
        }
    </script>
